<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>从读数到行动</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="prototype-shell">
      <aside class="storyboard" aria-label="原型页面">
        <div>
          <p class="eyebrow">HeartStep</p>
          <h1>从读数到行动</h1>
          <p class="story-copy">
            读懂血压状态，给出下一步行动，并让每一次完成都被看见。
          </p>
        </div>
        <div id="screenNav" class="screen-nav"></div>
      </aside>

      <main class="stage">
        <section class="phone-frame" aria-label="手机界面预览">
          <div class="phone-hardware"></div>
          <div id="phoneScreen" class="phone-screen"></div>
        </section>
        <div class="stage-controls" aria-label="页面控制">
          <button id="prevScreen" type="button" class="ghost-button">上一页</button>
          <span id="screenCounter" class="counter"></span>
          <button id="nextScreen" type="button" class="ghost-button">下一页</button>
        </div>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
